

services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/eventsphere
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mongo-data: